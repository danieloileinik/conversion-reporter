name: dotnet test & deploy docker image
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'  
    - name: restore dependencies
      run: dotnet restore
    - name: build
      run: dotnet build --no-restore
    - name: run tests
      run: dotnet test --no-build --verbosity normal
    - name: set up docker buildx
      uses: docker/setup-buildx-action@v3
    - name: log in to ghcr
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: build and push docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}:latest

    - name: deploy to vps
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            docker compose -f /opt/conversionreporter/docker-compose.yml down
            
            docker compose -f /opt/conversionreporter/docker-compose.yml up -d postgres
            
            sleep 5
            
            docker run --rm \
              --network conversionreporter_default \
              --env-file /opt/conversionreporter/.env.production \
              ghcr.io/${{ github.repository }}:latest \
              dotnet ef database update \
                --project src/Infrastructure/ConversionReporter.Infrastructure.Persistence \
                --startup-project src/Presentation/ConversionReporter.Presentation.Grpc
            
            docker compose -f /opt/conversionreporter/docker-compose.yml up -d
