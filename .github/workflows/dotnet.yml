name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: restore
        run: dotnet restore

      - name: build
        run: dotnet build --no-restore

      - name: unit tests
        run: dotnet test tests/ConversionReporter.Tests --no-build --verbosity normal

      - name: integration tests
        run: dotnet test tests/ConversionReporter.IntegrationTests --no-build --verbosity normal

  publish:
    runs-on: ubuntu-latest
    needs: test                          
    if: github.ref == 'refs/heads/main'  
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish                      
    if: github.ref == 'refs/heads/main'
    steps:
      - name: deploy to vps
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:latest
            docker compose -f /opt/conversionreporter/docker-compose.yml down

            docker compose -f /opt/conversionreporter/docker-compose.yml up -d postgres

            until docker compose -f /opt/conversionreporter/docker-compose.yml exec -T postgres pg_isready; do
              sleep 1
            done

            docker run --rm \
              --network conversionreporter_default \
              --env-file /opt/conversionreporter/.env.production \
              ghcr.io/${{ github.repository }}:latest \
              dotnet ef database update \
                --project src/Infrastructure/ConversionReporter.Infrastructure.Persistence \
                --startup-project src/Presentation/ConversionReporter.Presentation.Grpc

            docker compose -f /opt/conversionreporter/docker-compose.yml up -d
